name: MediCheck CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**', 'model/**', 'ui/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linter
        run: |
          pip install flake8
          flake8 api/ model/ frontend/ --max-line-length=100 \
            --exclude=__pycache__

      - name: Run tests
        run: |
          pytest tests/ -v --tb=short

      - name: Test summary
        if: always()
        run: echo "✅ CI pipeline complete"
